<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static',filename='css/theme.css') }}">

<style>

.container{
max-width:1200px;
padding:40px;
width:100%;
margin:0 auto;  /* centers dashboard */
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.stat{
background:var(--card-bg);
border:1px solid var(--border-soft);
border-radius:12px;
padding:25px;
box-shadow:var(--shadow-soft);
}

</style>

</head>

<body>

<div class="container">

<h1 class="title">Adventure Dashboard</h1>

<p class="subtitle">Welcome {{ username }}</p>

<a href="{{ url_for('game') }}" class="btn-primary" id="playBtn" style="opacity:0.5;pointer-events:none;">
Play Game
</a>

<div class="card" style="margin-top:30px">

<h3>Upload Notes</h3>

<form id="uploadForm" enctype="multipart/form-data">

<input type="file" name="file" id="fileInput" accept=".pdf,.txt,.docx" required>

<br><br>

<button type="submit" class="btn-primary">Upload Notes</button>

</form>

<p id="uploadStatus" style="margin-top:10px;color:#6b7280">
  Upload your study notes and the game will generate quiz questions from them.
</p>
<script>

document.getElementById("uploadForm").addEventListener("submit", async function(e){

e.preventDefault()

const fileInput=document.getElementById("fileInput")
const status=document.getElementById("uploadStatus")

const formData=new FormData()
formData.append("file",fileInput.files[0])

status.innerText="Uploading and generating questions..."

try{

const response=await fetch("/upload",{
method:"POST",
body:formData
})

const data=await response.json()

if(data.success){

status.innerText="✅ Notes uploaded! You can now play the game."

document.getElementById("playBtn").style.opacity="1"
document.getElementById("playBtn").style.pointerEvents="auto"

}else{

status.innerText="❌ "+data.error

}

}catch(err){

status.innerText="❌ Upload failed"

}

})

</script>

</div>

<div class="stats">

<div class="stat">

<h3>Level</h3>

<p>{{ level }}</p>

</div>

<div class="stat">

<h3>Score</h3>

<p>{{ score }}</p>

</div>

<div class="stat">

<h3>Achievements</h3>

<p>🏆 🌟 💎</p>

</div>

</div>

</div>

</body>
</html>
