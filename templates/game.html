<!DOCTYPE html>
<html>
<head>
    <title>2D Treasure Hunt</title>
    <link rel="stylesheet" href="/static/css/gstyle.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="main-layout">
    <div class="score-box">
        <h3>Score</h3>
        <div id="scoreDisplay">0</div>
    </div>

    <div class="game-container">
        <div class="header">
            <div id="levelDisplay">Level: 1</div>
        </div>

        <div class="game-area">
            <div class="player" id="player"></div>
            <div class="level-banner" id="levelBanner">Level Up!</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="timer-box">
            <h3>Timer</h3>
            <div id="timerDisplay">30</div>
        </div>

        <div class="info-box">
            <h3>Game Info</h3>
            <p>Collect all treasures!</p>
        </div>
    </div>
</div>

<div class="quiz-popup" id="quizPopup">
    <div class="quiz-box">
        <h3>Treasure Quiz</h3>
        <p id="questionText">Loading question...</p>
        <p id="hintText" style="color:red; display:none;">Hint will appear here</p>
        <button></button>
        <button></button>
        <button></button>
        <button></button>
    </div>
</div>

<div id="gameOverCard" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:2000;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
">

<h1>🎉 Treasure Completed!</h1>

<h2 id="finalScore"></h2>

<p>Press ENTER to return to dashboard</p>

</div>

<script>
const USER_ID = "{{ session['user_id'] }}";

let x=0, y=0, step=10, level=1, score=0, treasuresRemaining=1, timeLeft=30;
let quizActive=false, attempts=0, timerInterval;

const player = document.getElementById("player");
const gameArea = document.querySelector(".game-area");

// Player movement
document.addEventListener("keydown", e => {
    if(quizActive) return;
    const gameWidth = gameArea.clientWidth - player.offsetWidth;
    const gameHeight = gameArea.clientHeight - player.offsetHeight;

    let newX = x, newY = y;
    if(e.key==="ArrowRight") newX=Math.min(x+step, gameWidth);
    if(e.key==="ArrowLeft") newX=Math.max(x-step, 0);
    if(e.key==="ArrowDown") newY=Math.min(y+step, gameHeight);
    if(e.key==="ArrowUp") newY=Math.max(y-step, 0);

    if(!checkObstacleCollision(newX,newY)){ x=newX; y=newY; }

    player.style.left=x+"px";
    player.style.top=y+"px";

    checkCollision();
});

// Collision with treasures
function checkCollision(){
    document.querySelectorAll(".treasure").forEach(t=>{
        if(x < t.offsetLeft + t.offsetWidth &&
           x + player.offsetWidth > t.offsetLeft &&
           y < t.offsetTop + t.offsetHeight &&
           y + player.offsetHeight > t.offsetTop){
            t.remove();
            openQuiz();
        }
    });
}

// Spawn treasures immediately
function spawnTreasures(count){
    document.querySelectorAll(".treasure").forEach(t=>t.remove());
    for(let i=0;i<count;i++){
        const t = document.createElement("div");
        t.classList.add("treasure");
        let valid=false;
        while(!valid){
            const maxX=gameArea.clientWidth-30, maxY=gameArea.clientHeight-30;
            const randX=Math.floor(Math.random()*maxX);
            const randY=Math.floor(Math.random()*maxY);
            if(!checkObstacleCollision(randX, randY)){
                valid=true;
                t.style.left=randX+"px";
                t.style.top=randY+"px";
            }
        }
        gameArea.appendChild(t);
    }
}

// Obstacles
function spawnObstacles(count){
    document.querySelectorAll(".obstacle").forEach(o=>o.remove());
    for(let i=0;i<count;i++){
        const o = document.createElement("div");
        o.classList.add("obstacle");
        o.style.left=Math.floor(Math.random()*(gameArea.clientWidth-80))+"px";
        o.style.top=Math.floor(Math.random()*(gameArea.clientHeight-80))+"px";
        gameArea.appendChild(o);
    }
}

function checkObstacleCollision(newX,newY){
    return Array.from(document.querySelectorAll(".obstacle")).some(o=>{
        return newX < o.offsetLeft + o.offsetWidth &&
               newX + player.offsetWidth > o.offsetLeft &&
               newY < o.offsetTop + o.offsetHeight &&
               newY + player.offsetHeight > o.offsetTop;
    });
}

// Timer
function startTimer(){
    clearInterval(timerInterval);
    timeLeft = Math.max(10, 30 - level*2);
    const disp = document.getElementById("timerDisplay");
    disp.innerText=timeLeft; disp.style.color="black";
    timerInterval=setInterval(()=>{
        timeLeft--; disp.innerText=timeLeft;
        if(timeLeft<=10) disp.style.color="red";
        if(timeLeft<=0){ clearInterval(timerInterval); alert("Hint: Time running out!"); }
    },1000);
}

// Level banner
function showLevelBanner(lvl){
    const b = document.getElementById("levelBanner");
    b.innerText="Level "+lvl;
    b.style.display="block";
    setTimeout(()=>b.style.display="none",1500);
}

// Level up
async function levelUp(){

    if(level >= 10){
        showGameOver();
        return;
    }

    level++;

    document.getElementById("levelDisplay").innerText="Level: "+level;

    treasuresRemaining=1;

    spawnTreasures(treasuresRemaining);

    showLevelBanner(level);

    startTimer();

    spawnObstacles(level);

    updateProgress();
}

function updateProgress(){

fetch("/update-progress",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id: USER_ID,
level: level,
score: score
})
})
}

// Restart level
function restartLevel(){
    treasuresRemaining=1;
    spawnTreasures(treasuresRemaining);
    x=y=0; player.style.left="0px"; player.style.top="0px";
    startTimer();
}

function showGameOver(){

document.getElementById("gameOverCard").style.display="flex";

document.getElementById("finalScore").innerText="Final Score: "+score;

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

document.addEventListener("keydown", function(e){
if(e.key==="Enter"){
window.location.href="/dashboard";
}
});
}

// Quiz popup (fetch asynchronously)
function openQuiz(){
    quizActive=true;
    document.getElementById("quizPopup").style.display="flex";
    document.getElementById("hintText").style.display="none";

    fetch(`/generate-question?level=${level}&user_id=${USER_ID}`)
      .then(r=>r.json())
      .then(data=>{
        const q=data.question;
        document.getElementById("questionText").innerText=q.question;
        document.getElementById("hintText").innerText="Hint: "+q.hint;

        const buttons=document.querySelectorAll(".quiz-box button");
        for(let i=0;i<4;i++){
            buttons[i].innerText=q.options[i];
            buttons[i].onclick=()=>checkAnswer(q.options[i]===q.correct_answer);
        }
      })
      .catch(err=>console.log("Failed to load question", err));
}

// Check answer
function checkAnswer(correct){
    if(correct){
        score+=10;
        alert("Correct!");
        document.getElementById("scoreDisplay").innerText=score;
        quizActive=false; document.getElementById("quizPopup").style.display="none";
        treasuresRemaining--; if(treasuresRemaining===0) levelUp();
        attempts=0;
    } else {
        attempts++;
        if(attempts===1){ alert("Wrong! Here's a hint."); const hint = document.getElementById("hintText");
hint.style.display="block";
hint.style.color="red"; }
        else{ alert("Wrong again! Restarting level."); quizActive=false; attempts=0; document.getElementById("quizPopup").style.display="none"; restartLevel(); }
    }
}

// Initialize game
spawnTreasures(1);
startTimer();
spawnObstacles(1);
</script>

</body>
</html>
