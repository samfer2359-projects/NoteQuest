<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

    <style>
        body {
            margin: 0;
        }

        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 420px;
            padding: 20px;
            border-radius: 10px;
        }

        .input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
        }

        .link {
            display: block;
            text-align: center;
            margin-top: 10px;
        }

        #errorBox {
            display: none;
            background: #ffe5e5;
            color: #b00020;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .shake {
            animation: shake 0.3s;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="card" id="card">

        <h2 class="title">Reset Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <div id="errorBox"></div>

        <form id="resetForm" method="POST">

            <input class="input" id="email" name="email" type="email" placeholder="Enter your email">

            <input class="input" id="password" name="password" type="password" placeholder="New password">

            <input class="input" id="confirm_password" name="confirm_password" type="password" placeholder="Confirm password">

            <button class="btn-primary" type="submit">Reset Password</button>

        </form>

        <a class="link" href="/login">Back to Login</a>

    </div>
</div>

<script>
const form = document.getElementById("resetForm");
const errorBox = document.getElementById("errorBox");
const card = document.getElementById("card");

const email = document.getElementById("email");
const password = document.getElementById("password");
const confirm = document.getElementById("confirm_password");

function showErrors(errors) {
    if (errors.length > 0) {
        errorBox.style.display = "block";
        errorBox.innerHTML = errors.join("<br>");
    } else {
        errorBox.style.display = "none";
    }
}

/* LIVE VALIDATION */
email.addEventListener("input", validate);
password.addEventListener("input", validate);
confirm.addEventListener("input", validate);

function validate() {
    let errors = [];

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (email.value && !emailPattern.test(email.value)) {
        errors.push("Invalid email format");
    }

    if (password.value && password.value.length < 6) {
        errors.push("Password too weak (min 6 chars)");
    }

    if (confirm.value && confirm.value !== password.value) {
        errors.push("Passwords do not match");
    }

    showErrors(errors);
}

/* SUBMIT VALIDATION */
form.addEventListener("submit", function(e) {
    let errors = [];

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!email.value.trim()) errors.push("Email is required");
    else if (!emailPattern.test(email.value)) errors.push("Enter valid email");

    if (!password.value) errors.push("Password is required");
    else if (password.value.length < 6) errors.push("Password too weak");

    if (!confirm.value) errors.push("Confirm password is required");
    else if (password.value !== confirm.value) errors.push("Passwords do not match");

    if (errors.length > 0) {
        e.preventDefault();
        showErrors(errors);

        card.classList.remove("shake");
        void card.offsetWidth;
        card.classList.add("shake");
    }
});
</script>

</body>
</html>
