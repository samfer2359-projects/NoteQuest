<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link rel="stylesheet" href="{{ url_for('static',filename='css/theme.css') }}">

<style>

.wrapper{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}


</style>

</head>

<body>

<div class="wrapper">

<div class="card" style="width:420px">

<h2 class="title">Create Character</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<form method="POST" action="/signup">

<input class="input" name="username" placeholder="Username" required>

<br><br>

<input class="input" name="email" placeholder="Email" required>

<br><br>

<input class="input" name="password" type="password" placeholder="Password" required>

<br><br>

<input class="input" name="confirm_password" type="password" placeholder="Confirm Password" required>

<br><br>

<button class="btn-primary" style="width:100%">Start Adventure</button>

<p style="text-align:center; margin-top:10px;">
  Already have a character? 
  <a href="/login" class="link">Login here</a>
</p>

</form>

</div>

</div>

</body>
</html>
