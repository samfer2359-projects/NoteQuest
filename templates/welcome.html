<!DOCTYPE html>
<html>
<head>

<title>NoteQuest</title>

<link rel="stylesheet" href="{{ url_for('static',filename='css/theme.css') }}">

<style>

main{
max-width:900px;
padding:80px 20px;
text-align:center;
margin:0 auto;   
z-index:10;
}

.features{
margin-top:60px;
display:flex;
justify-content:center;
gap:25px;
flex-wrap:nowrap;
}

.feature{
width:260px;
background:var(--card-bg);
border:1px solid var(--border-soft);
border-radius:12px;
padding:30px;
box-shadow:var(--shadow-soft);
}

</style>

</head>

<body>

<div id="starfield"></div>

<main>

<h1 class="title">NoteQuest</h1>

<p class="subtitle">DBMS Treasure Hunt Adventure</p>

<p>
Master database concepts by exploring maps,
solving riddles, and unlocking treasure.
</p>

<br>

<a href="/signup" class="btn-primary">Begin Adventure</a>
<a href="/login" class="btn-primary btn-secondary">Login</a>

<div class="features">

<div class="feature">
<h3>📜 Explore Maps</h3>
<p>Navigate magical database realms.</p>
</div>

<div class="feature">
<h3>📤 Upload Notes</h3>
<p>Turn study material into quests.</p>
</div>

<div class="feature">
<h3>🏆 Earn Rewards</h3>
<p>Unlock achievements and badges.</p>
</div>

</div>

</main>

<script>

const sf=document.getElementById("starfield")

for(let i=0;i<80;i++){

let s=document.createElement("div")

s.className="star"

let size=Math.random()*3+1

s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${Math.random()*3+2}s;--delay:${Math.random()*4}s;`

sf.appendChild(s)

}

</script>

</body>
</html>
