<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NoteQuest Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===============================
   GLOBAL
================================ */

body{
    margin:0;
    font-family:'Nunito',sans-serif;
    background:#b4e7b1;
    color:#2c3e2f;

    background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
    background-size:40px 40px;
}

/* ===============================
   HEADER
================================ */

header{
    text-align:center;
    padding:25px;
}

header h1{
    font-family:'Fredoka One';
    color:#2b5d34;
}

/* ===============================
   LAYOUT
================================ */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:20px;
    flex-wrap:wrap;
}

/* ===============================
   PANELS
================================ */

.panel{
    background:white;
    padding:20px;
    border-radius:12px;
    width:260px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.15);
}

/* ===============================
   TREASURE MAP CENTER
================================ */

.map{
    text-align:center;
}

/* Replace image with treasure map graphic */
.map img{
    width:260px;
}

/* ===============================
   PROGRESS BAR
================================ */

.progress-bar{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.progress{
    height:100%;
    width:60%; /* dynamic value later */
    background:gold;
}

/* ===============================
   BUTTONS
================================ */

button{
    background:#f4c542;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ffd95e;
}

/* ===============================
   UPLOAD
================================ */

.upload{
    margin-top:15px;
}

input[type=file]{
    margin-top:8px;
}

/* ===============================
   SMALL ACTION BUTTONS
================================ */

.small-btn{
    margin-top:10px;
    display:block;
    width:100%;
}

</style>

</head>

<body>

<header>
<h1>NoteQuest Adventure Dashboard</h1>
</header>

<div class="container">

<!-- =========================
LEFT PANEL - USER STATS
========================= -->

<aside class="panel">

<h3>Player Stats</h3>

<p><strong>Username:</strong> {{username}}</p>

<p><strong>Level:</strong> {{level}}</p>

<p><strong>Score:</strong> {{score}}</p>

<p><strong>Progress to next level</strong></p>

<div class="progress-bar">
<div class="progress"></div>
</div>

</aside>


<!-- =========================
CENTER MAP
========================= -->

<section class="map">

<!-- Replace with a real treasure map illustration -->
<img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Treasure Map">

</section>


<!-- =========================
RIGHT PANEL
========================= -->

<aside class="panel">

<h3>Upcoming Challenge</h3>

<!-- Replace with dynamic riddle from backend -->
<p>{{riddle_preview}}</p>

<button class="small-btn">Play Now</button>

<div class="upload">

<label><strong>Upload Notes</strong></label>

<input type="file" accept=".txt,.docx,.pdf">

</div>

<button class="small-btn">📜 View Notes</button>

<button class="small-btn">🏆 Achievements</button>

</aside>

</div>

<footer style="text-align:center;padding:20px;">

NoteQuest DBMS Learning Game

</footer>

</body>
</html>
