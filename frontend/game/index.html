<!DOCTYPE html>
<html>

<head>
    <title>2D Treasure Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-layout">

        <!-- LEFT SCORE BOX -->
        <div class="score-box">
            <h3>Score</h3>
            <div id="scoreDisplay">0</div>
        </div>

        <!-- GAME AREA -->
        <div class="game-container">

            <div class="header">
                <div id="levelDisplay">Level: 1</div>
            </div>

            <div class="game-area">
                <div class="player" id="player"></div>
                <div class="obstacle" style="top:100px; left:100px;"></div>
                <div class="obstacle" style="top:300px; left:200px;"></div>
                <div class="level-banner" id="levelBanner">
                    Level Up!
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right-panel">

            <div class="timer-box">
                <h3>Timer</h3>
                <div id="timerDisplay">30</div>
            </div>

            <div class="info-box">
                <h3>Game Info</h3> <br>
                <p>Collect all treasures!</p>
            </div>

        </div>

    </div>

    <!-- QUIZ POPUP -->
    <div class="quiz-popup" id="quizPopup">
        <div class="quiz-box">

            <h3>Treasure Quiz</h3>

            <p>Which language is used to style web pages?</p>
            <p id="hintText" style="color:red; display:none;">
                Hint: It is used to design the look of web pages.
            </p>
            <button onclick="checkAnswer(true)">CSS</button>
            <button onclick="checkAnswer(false)">HTML</button>
            <button onclick="checkAnswer(false)">Python</button>
            <button onclick="checkAnswer(false)">Java</button>

        </div>
    </div>

    <script>
        let timeLeft = 30;
        let timerInterval;
        let score = 0;
        let quizActive = false;
        let attempts = 0;

        const player = document.getElementById("player");
        const gameArea = document.querySelector(".game-area");

        let x = 0;
        let y = 0;
        const step = 10;

        let level = 1;
        let treasuresRemaining = 1;

        document.addEventListener("keydown", function (event) {
            if (quizActive) return;

            const gameWidth = gameArea.clientWidth - player.clientWidth;
            const gameHeight = gameArea.clientHeight - player.clientHeight;

            let newX = x;
            let newY = y;

            if (event.key === "ArrowRight") newX = Math.min(x + step, gameWidth);
            if (event.key === "ArrowLeft") newX = Math.max(x - step, 0);
            if (event.key === "ArrowDown") newY = Math.min(y + step, gameHeight);
            if (event.key === "ArrowUp") newY = Math.max(y - step, 0);

            if (!checkObstacleCollision(newX, newY)) {
                x = newX;
                y = newY;
            }

            player.style.left = x + "px";
            player.style.top = y + "px";

            checkCollision();
        });

        function checkCollision() {
            const treasures = document.querySelectorAll(".treasure");

            treasures.forEach(treasure => {
                const obsX = treasure.offsetLeft;
                const obsY = treasure.offsetTop;
                const obsWidth = treasure.offsetWidth;
                const obsHeight = treasure.offsetHeight;

                if (
                    x < obsX + obsWidth &&
                    x + player.offsetWidth > obsX &&
                    y < obsY + obsHeight &&
                    y + player.offsetHeight > obsY
                ) {
                    treasure.remove();
                    openQuiz();
                }
            });
        }

        function spawnTreasures(count) {
            document.querySelectorAll(".treasure").forEach(t => t.remove());

            for (let i = 0; i < count; i++) {
                let newTreasure = document.createElement("div");
                newTreasure.classList.add("treasure");

                let validPosition = false;

                while (!validPosition) {
                    const maxX = gameArea.clientWidth - 30;
                    const maxY = gameArea.clientHeight - 30;

                    let randomX = Math.floor(Math.random() * maxX);
                    let randomY = Math.floor(Math.random() * maxY);

                    if (!checkObstacleCollision(randomX, randomY)) {
                        validPosition = true;
                        newTreasure.style.left = randomX + "px";
                        newTreasure.style.top = randomY + "px";
                    }
                }

                gameArea.appendChild(newTreasure);
            }
        }

        function levelUp() {
            level++;

            document.getElementById("levelDisplay").innerText = "Level: " + level;

            treasuresRemaining = 1;
            spawnTreasures(1);

            showLevelBanner(level);

            startTimer();
        }

        function openQuiz() {
            quizActive = true;
            document.getElementById("quizPopup").style.display = "flex";

            document.getElementById("hintText").style.display = "none";
        }

        function closeQuiz() {
            quizActive = false;
            document.getElementById("quizPopup").style.display = "none";

            score += 10;
            document.getElementById("scoreDisplay").innerText = score;

            treasuresRemaining--;

            if (treasuresRemaining === 0) {
                levelUp();
            }
        }

        function checkAnswer(correct) {

            if (correct) {

                score += 10;
                alert("Correct Answer!");

                document.getElementById("scoreDisplay").innerText = score;

                quizActive = false;
                document.getElementById("quizPopup").style.display = "none";

                attempts = 0;   // reset attempts

                treasuresRemaining--;

                if (treasuresRemaining === 0) {
                    levelUp();
                }

            } else {

                attempts++;

                if (attempts === 1) {

                    alert("Wrong Answer! Here's a hint.");
                    document.getElementById("hintText").style.display = "block";

                } else {

                    alert("Wrong again! Restarting level.");
                    document.getElementById("quizPopup").style.display = "none";

                    attempts = 0;
                    quizActive = false;

                    restartLevel();

                }

            }
        }

        function checkObstacleCollision(newX, newY) {
            const obstacles = document.querySelectorAll(".obstacle");

            for (let obstacle of obstacles) {
                const obsX = obstacle.offsetLeft;
                const obsY = obstacle.offsetTop;
                const obsWidth = obstacle.offsetWidth;
                const obsHeight = obstacle.offsetHeight;

                if (
                    newX < obsX + obsWidth &&
                    newX + player.offsetWidth > obsX &&
                    newY < obsY + obsHeight &&
                    newY + player.offsetHeight > obsY
                ) {
                    return true;
                }
            }
            return false;
        }

        function startTimer() {
            clearInterval(timerInterval);

            timeLeft = 30;
            document.getElementById("timerDisplay").innerText = timeLeft;
            document.getElementById("timerDisplay").style.color = "black";

            timerInterval = setInterval(function () {
                timeLeft--;
                document.getElementById("timerDisplay").innerText = timeLeft;

                if (timeLeft <= 10) {
                    document.getElementById("timerDisplay").style.color = "red";
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Hint: CSS is used to style web pages!");
                }

            }, 1000);
        }

        function showLevelBanner(currentLevel) {
            const banner = document.getElementById("levelBanner");

            banner.innerText = "Level " + currentLevel;
            banner.style.display = "block";

            setTimeout(function () {
                banner.style.display = "none";
            }, 1500);
        }

        function restartLevel() {
            treasuresRemaining = 1;
            spawnTreasures(1);

            x = 0;
            y = 0;
            player.style.left = "0px";
            player.style.top = "0px";

            startTimer();
        }

        spawnTreasures(1);
        startTimer();
    </script>


</body>

</html>
